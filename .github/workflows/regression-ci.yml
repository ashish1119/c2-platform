name: regression-ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp docker/.env.example docker/.env

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time" >&2
          docker compose ps
          exit 1

      - name: Run SMS smoke test
        run: docker compose exec -T backend python - < scripts/sms_smoke_test.py

      - name: Run security regression smoke test
        run: docker compose exec -T backend python - < scripts/security_regression_smoke_test.py

      - name: Run platform regression test
        run: docker compose exec -T backend python - < scripts/platform_regression_test.py

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=300 backend frontend postgres

      - name: Teardown
        if: always()
        run: docker compose down -v

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build:ci
