#version: "3.9"
 
services:
  redis:
    image: redis:7-alpine
    container_name: c2_redis
    restart: always
    ports:
      - "6379:6379"

  postgres:
    image: postgis/postgis:15-3.4
    container_name: c2_postgres
    restart: always
    env_file:
      - ./docker/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U c2user -d c2db "]
      interval: 5s
      timeout: 5s
      retries: 5
 
  backend:
    build: ./backend
    container_name: c2_backend
    restart: always
    env_file:
      - ./docker/.env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
      - "9300:9300"
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
 
  frontend:
    build: ./frontend
    container_name: c2_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
 
volumes:
  postgres_data: